version: "3.9"

services:
  bot:
    build: .
    container_name: arcadia-slot-bot
    ports:
      - "8000:8000"
      - "9090:9090"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped
    command: fastapi run app/main.py --host 0.0.0.0 --port 8000

  scheduler:
    build: .
    container_name: arcadia-scheduler
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
      - bot
    restart: unless-stopped
    command: python -m app.core.scheduler

  redis:
    image: redis:7-alpine
    container_name: arcadia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data: